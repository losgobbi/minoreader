name: CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

jobs:
  # ---------------- Linux: tests + build (.deb) ----------------
  linux:
    name: Linux (test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Install packaging deps (jpackage .deb)
        run: sudo apt-get update && sudo apt-get install -y fakeroot binutils

      - name: Resolve version (from v* tag, else 1.0.0)
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=1.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Test
        run: ./gradlew :composeApp:desktopTest --no-daemon --stacktrace
      - name: Build (.deb)
        run: ./gradlew :composeApp:packageDeb -PappVersion=${{ steps.ver.outputs.version }} --no-daemon --stacktrace

      - name: Upload Linux artifact (.deb)
        uses: actions/upload-artifact@v4
        with:
          name: minoreader-linux-deb
          path: composeApp/build/compose/binaries/main/deb/*.deb
          if-no-files-found: error

  # ---------------- Android: build (APK) ----------------
  # No Android unit tests yet — build only for now.
  android:
    name: Android (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version (from v* tag, else 1.0.0)
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=1.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (debug APK)
        run: ./gradlew :composeApp:assembleDebug -PappVersion=${{ steps.ver.outputs.version }} -PversionCode=${{ github.run_number }} --no-daemon --stacktrace

      - name: Upload Android artifact (APK)
        uses: actions/upload-artifact@v4
        with:
          name: minoreader-android-apk
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  # ---------------- Release: only on a v* tag, if both jobs passed ----------------
  release:
    name: Release
    needs: [ linux, android ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: minoreader-linux-deb
          path: dist/linux
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: minoreader-android-apk
          path: dist/android

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/linux/*.deb
            dist/android/*.apk
          generate_release_notes: true
